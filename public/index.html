<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Обратная связь</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="container">
      <section class="feedback-card">
        <h1>Связаться с нами</h1>
        <p class="subtitle">Мы ответим вам в течение 24 часов</p>

        <form id="feedbackForm" class="form" novalidate>
          <div class="form-grid">
            <div class="input-group" id="lastNameGroup">
              <label for="lastName">Фамилия *</label>
              <input
                type="text"
                id="lastName"
                name="lastName"
                placeholder="Иванов"
                required
                autocomplete="off"
              />
              <div class="suggestions" id="lastNameSuggestions"></div>
            </div>

            <div class="input-group" id="firstNameGroup">
              <label for="firstName">Имя *</label>
              <input
                type="text"
                id="firstName"
                name="firstName"
                placeholder="Иван"
                required
                autocomplete="off"
              />
              <div class="suggestions" id="firstNameSuggestions"></div>
            </div>

            <div class="input-group" id="middleNameGroup">
              <label for="middleName">Отчество *</label>
              <input
                type="text"
                id="middleName"
                name="middleName"
                placeholder="Иванович"
                required
                autocomplete="off"
              />
              <div class="suggestions" id="middleNameSuggestions"></div>
            </div>

            <div class="input-group">
              <label for="phone">Телефон *</label>
              <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="+7 (___) ___-__-__"
                required
              />
            </div>

            <div class="input-group full-width">
              <label for="email">Электронная почта *</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="example@mail.com"
                required
              />
            </div>

            <div class="input-group full-width">
              <label for="topic">Тема обращения</label>
              <select id="topic" name="topic">
                <option value="support">Техническая поддержка</option>
                <option value="sales">Отдел продаж</option>
                <option value="partnership">Сотрудничество</option>
                <option value="other">Другое</option>
              </select>
            </div>

            <div class="input-group full-width">
              <label for="message">Сообщение</label>
              <textarea
                id="message"
                name="message"
                rows="4"
                placeholder="Ваш вопрос..."
              ></textarea>
            </div>
          </div>

          <div id="captcha-container" class="captcha-box"></div>

          <div class="form-footer">
            <button type="submit" id="submitBtn" class="btn-submit">
              <span class="btn-text">Отправить сообщение</span>
              <div class="loader"></div>
            </button>
          </div>

          <div id="formResponse" class="form-response"></div>
        </form>
      </section>
    </main>

    <script src="js/mask.js" type="module"></script>
    <script src="js/api.js" type="module"></script>
    <script src="js/main.js" type="module"></script>

    <script
      src="https://smartcaptcha.yandexcloud.net/captcha.js?render=onload&onload=onloadCaptchaCallback"
      async
    ></script>
  </body>
</html>
